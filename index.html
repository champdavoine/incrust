<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <title>Incrust</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="drag-strip"></div>

  <aside class="console">
    <div class="console-head">
      <div class="brand">INCRUST</div>
      <button class="icon-btn" id="settingsBtn" aria-label="Devices" aria-expanded="false" aria-controls="settingsPopover">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3.2" />
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.08a1.7 1.7 0 0 0 1.03-1.56V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56h.08a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.08a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1.03z" />
        </svg>
      </button>
    </div>

    <h1 class="headline">Record<span class="sub">Screen</span></h1>

    <div class="timer" id="bigTimer" aria-live="off">
      <span class="timer-dot"></span>
      <span class="digits"><span class="dim">00:</span>00:00</span>
    </div>

    <div class="meter" id="meter" aria-hidden="true"></div>

    <div class="console-space"></div>

    <div class="controls">
      <div>
        <div class="ctl-label">FRAME</div>
        <div class="seg" id="formatSeg">
          <button data-fmt="match" class="active">Screen</button>
          <button data-fmt="landscape">16:9</button>
          <button data-fmt="portrait">9:16</button>
          <button data-fmt="square">1:1</button>
        </div>
      </div>
      <div>
        <label class="ctl-label" for="zoomRange">ZOOM <span class="val" id="zoomVal">1.0×</span></label>
        <input type="range" id="zoomRange" min="100" max="300" value="100" />
      </div>
      <div>
        <label class="ctl-label" for="sizeRange">BUBBLE SIZE <span class="val" id="sizeVal">28%</span></label>
        <input type="range" id="sizeRange" min="12" max="55" value="28" />
      </div>
      <div>
        <label class="ctl-label" for="effectSelect">BUBBLE EFFECT</label>
        <select id="effectSelect">
          <option value="none">None</option>
          <option value="bw">Black &amp; white</option>
          <option value="sepia">Sepia</option>
          <option value="vintage">Vintage</option>
          <option value="cool">Cool</option>
          <option value="warm">Warm</option>
          <option value="invert">Invert</option>
        </select>
      </div>
      <label class="toggle"><span>Follow cursor</span><input type="checkbox" id="followToggle" /></label>
    </div>

    <div class="transport">
      <button class="tile-btn" id="startBtn">
        <span class="disc"><span class="glyph" id="startGlyph">▶</span></span>
        <span class="tile-name" id="startLabel">START</span>
      </button>
      <button class="tile-btn tile-rec" id="recBtn" disabled>
        <span class="tile-dot"></span>
        <span class="disc"><span class="glyph" id="recGlyph">●</span></span>
        <span class="tile-name" id="recLabel">REC</span>
        <span class="tile-hint">MP4</span>
      </button>
    </div>

    <div class="status" id="status"><span class="dot"></span>Idle — press Start.</div>
  </aside>

  <main class="stage">
    <div class="placeholder" id="placeholder">
      <div class="grille"></div>
      <p>Press <strong>Start</strong> to pick a screen or window.<br />
        Drag your bubble anywhere · scroll on it to resize.</p>
    </div>
    <div class="preview-wrap">
      <div class="preview-frame">
        <canvas id="preview" style="display:none;"></canvas>
        <div class="chip" id="resChip" style="display:none;">— × — · — fps</div>
        <div class="rec-badge" id="recBadge" style="display:none;">
          <span class="rec-dot"></span>REC <span id="recTime">00:00</span>
        </div>
        <div class="size-chip" id="sizeChip">28%</div>
      </div>
    </div>
  </main>

  <div class="popover" id="settingsPopover" role="dialog" aria-label="Devices" hidden>
    <div class="popover-title">DEVICES</div>
    <div>
      <label for="camSelect">WEBCAM</label>
      <select id="camSelect"></select>
    </div>
    <div>
      <label for="micSelect">MICROPHONE</label>
      <select id="micSelect"></select>
    </div>
    <div class="hint">Device changes apply the next time you press Start.</div>
    <div class="popover-foot">
      <button class="reset" id="resetBtn">Reset settings</button>
    </div>
  </div>

  <!-- Mask refinement filter used by the compositor (app.js). Chain:
       1. blur softens the raw segmentation edge so the threshold can bite,
       2. feFuncA linear (slope 4, midpoint ~0.62) chokes the edge INWARD —
          removing the background halo — and hardens ghosty low-confidence alpha,
       3. final blur re-feathers the choked edge. -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="maskRefine" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3" />
      <feComponentTransfer><feFuncA type="linear" slope="4" intercept="-1.98" /></feComponentTransfer>
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </svg>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
  <script>
    // Paint each slider's track up to the thumb with the ink colour. Runs after
    // app.js (which has already restored saved values), then tracks live input.
    (function () {
      const paint = (el) => {
        const min = +el.min || 0, max = +el.max || 100;
        const pct = max > min ? ((el.value - min) / (max - min)) * 100 : 0;
        el.style.setProperty('--fill', pct + '%');
      };
      document.querySelectorAll('input[type=range]').forEach((el) => {
        paint(el);
        el.addEventListener('input', () => paint(el));
      });
    })();
  </script>
</body>
</html>
